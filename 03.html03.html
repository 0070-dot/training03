<!DOCTYPE html> <!-- HTML5 문서 선언 -->
<html lang="ko"> <!-- 문서 시작 / 언어 설정 -->

<head>
    <meta charset="UTF-8"> <!-- 문자 인코딩 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 반응형 -->
    <title>inline</title> <!-- 탭 제목 -->
</head>

<body>

    <!-- span: 의미 없는 인라인 태그 (텍스트 일부 묶기용) -->
    <span>Lorem ipsum dolor sit.</span>

    <!-- strong: 중요 강조 (의미 있음, 보통 굵게 표시됨) -->
    <strong>Lorem ipsum dolor sit.</strong>

    <!-- b: 단순 굵게 (의미 없음, 디자인용) -->
    <b>Lorem ipsum dolor sit.</b>

    <!-- em: 강조 (의미 있음, 보통 기울임) -->
    <em>Lorem ipsum dolor sit.</em>

    <!-- i: 단순 기울임 (의미 없음, 디자인용) -->
    <i>Lorem ipsum dolor sit.</i>

    <!-- a: 링크 태그 (클릭 시 이동) -->
    <a href="">Lorem ipsum dolor sit.</a>

</body>

</html>
